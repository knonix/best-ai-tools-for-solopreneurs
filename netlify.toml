[build]
  publish = "."
  command = "echo 'No build required - static site'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/reviews"
  to = "/reviews/index.html"
  status = 200